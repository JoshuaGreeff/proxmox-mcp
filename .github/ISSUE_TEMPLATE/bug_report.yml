name: Bug report
description: Report a reproducible defect in proxmox-mcp.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue without requiring access to private infrastructure details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Describe the exact steps, tool calls, or commands needed to reproduce the issue.
      placeholder: |
        1. Start the server with ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit, branch, or package version.
      placeholder: dev @ abc1234
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, host OS, client, and deployment mode.
      placeholder: Node 24, Windows 11, Codex, stdio
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant logs or outputs. Redact secrets, tokens, private keys, and confidential infrastructure details.
      render: shell
